---
name: Publish Docker image

"on":
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          # Default image — apt Python 3, Debian base
          - image_suffix: ""
            dockerfile: Dockerfile
            build_args: ""
          # Deadsnakes variants — add/remove entries here
          - image_suffix: "_py3.12"
            dockerfile: Dockerfile.deadsnakes
            build_args: "PYTHON_MINOR=3.12"
          - image_suffix: "_py3.13"
            dockerfile: Dockerfile.deadsnakes
            build_args: "PYTHON_MINOR=3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: false

  test:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build image for testing
        uses: docker/build-push-action@v7
        with:
          load: true
          push: false
          tags: test-image:ci

      - name: Smoke test — claude --help
        run: docker run --rm test-image:ci --help

      - name: Smoke test — claude --version
        run: docker run --rm test-image:ci --version

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # Default image — apt Python 3, Debian base
          - image_suffix: ""
            dockerfile: Dockerfile
            build_args: ""
          # Deadsnakes variants — add/remove entries here
          - image_suffix: "_py3.12"
            dockerfile: Dockerfile.deadsnakes
            build_args: "PYTHON_MINOR=3.12"
          - image_suffix: "_py3.13"
            dockerfile: Dockerfile.deadsnakes
            build_args: "PYTHON_MINOR=3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ac_images${{ matrix.image_suffix }}:latest
            ghcr.io/${{ github.repository_owner }}/ac_images${{ matrix.image_suffix }}:${{ github.ref_name }}
